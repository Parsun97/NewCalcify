openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Calcify API - Calculator platform backend
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: calculators
    description: Calculator registry and metadata
  - name: history
    description: Calculation history
  - name: favorites
    description: Favorite calculators
  - name: stats
    description: Platform statistics and trending

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /calculators:
    get:
      operationId: listCalculators
      tags: [calculators]
      summary: List all calculators
      description: Returns all available calculators with metadata
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category slug
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: List of calculators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Calculator"

  /calculators/{slug}:
    get:
      operationId: getCalculator
      tags: [calculators]
      summary: Get a calculator by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Calculator details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calculator"
        "404":
          description: Not found

  /calculators/categories:
    get:
      operationId: listCategories
      tags: [calculators]
      summary: List all calculator categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: Get calculation history
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: calculatorSlug
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Calculation history entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"
    post:
      operationId: saveHistory
      tags: [history]
      summary: Save a calculation to history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HistoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryEntry"

  /history/{id}:
    delete:
      operationId: deleteHistory
      tags: [history]
      summary: Delete a history entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /history/clear:
    delete:
      operationId: clearHistory
      tags: [history]
      summary: Clear all calculation history
      responses:
        "204":
          description: Cleared

  /favorites:
    get:
      operationId: listFavorites
      tags: [favorites]
      summary: Get favorited calculators
      responses:
        "200":
          description: Favorite calculators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Favorite"
    post:
      operationId: addFavorite
      tags: [favorites]
      summary: Add a calculator to favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Favorite"

  /favorites/{calculatorSlug}:
    delete:
      operationId: removeFavorite
      tags: [favorites]
      summary: Remove a calculator from favorites
      parameters:
        - name: calculatorSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /stats/trending:
    get:
      operationId: getTrending
      tags: [stats]
      summary: Get trending calculators
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 8
      responses:
        "200":
          description: Trending calculators with usage counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingCalculator"

  /stats/recently-used:
    get:
      operationId: getRecentlyUsed
      tags: [stats]
      summary: Get recently used calculators
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Recently used calculators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Calculator"

  /stats/platform:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Get platform-wide statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /stats/track:
    post:
      operationId: trackUsage
      tags: [stats]
      summary: Track calculator usage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UsageInput"
      responses:
        "204":
          description: Tracked

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Calculator:
      type: object
      required: [slug, name, description, category, categorySlug, icon]
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        categorySlug:
          type: string
        icon:
          type: string
        tags:
          type: array
          items:
            type: string
        isFeatured:
          type: ["boolean", "null"]
        usageCount:
          type: ["integer", "null"]

    Category:
      type: object
      required: [slug, name, description, icon, calculatorCount]
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        calculatorCount:
          type: integer

    HistoryEntry:
      type: object
      required: [id, calculatorSlug, calculatorName, inputs, result, createdAt]
      properties:
        id:
          type: integer
        calculatorSlug:
          type: string
        calculatorName:
          type: string
        inputs:
          type: object
          additionalProperties: true
        result:
          type: object
          additionalProperties: true
        label:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    HistoryInput:
      type: object
      required: [calculatorSlug, calculatorName, inputs, result]
      properties:
        calculatorSlug:
          type: string
        calculatorName:
          type: string
        inputs:
          type: object
          additionalProperties: true
        result:
          type: object
          additionalProperties: true
        label:
          type: string

    Favorite:
      type: object
      required: [id, calculatorSlug, calculatorName, createdAt]
      properties:
        id:
          type: integer
        calculatorSlug:
          type: string
        calculatorName:
          type: string
        createdAt:
          type: string
          format: date-time

    FavoriteInput:
      type: object
      required: [calculatorSlug, calculatorName]
      properties:
        calculatorSlug:
          type: string
        calculatorName:
          type: string

    TrendingCalculator:
      type: object
      required: [calculator, usageCount, rank]
      properties:
        calculator:
          $ref: "#/components/schemas/Calculator"
        usageCount:
          type: integer
        rank:
          type: integer

    PlatformStats:
      type: object
      required: [totalCalculators, totalCategories, totalCalculations, totalFavorites]
      properties:
        totalCalculators:
          type: integer
        totalCategories:
          type: integer
        totalCalculations:
          type: integer
        totalFavorites:
          type: integer

    UsageInput:
      type: object
      required: [calculatorSlug]
      properties:
        calculatorSlug:
          type: string
