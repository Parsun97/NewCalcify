kind = "web"
previewPath = "/"
title = "Calcify"
version = "1.0.0"
id = "artifacts/calcify"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18535

[services.development]
run = "pnpm --filter @workspace/calcify run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calcify", "run", "build" ]
publicDir = "artifacts/calcify/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18535"
BASE_PATH = "/"
